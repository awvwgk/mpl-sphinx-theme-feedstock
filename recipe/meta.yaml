{% set name = "mpl-sphinx-theme" %}
{% set version = "3.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mpl_sphinx_theme-{{ version }}.tar.gz
  sha256: c2c1c689612ebec1dcf0ea96e7e3025a96a8c63026a46fb124320060c5534576

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - matplotlib-base
    - pydata-sphinx-theme ==0.18.*
    - python >={{ python_min }}
    - sphinx-design
    

test:
  imports:
    - mpl_sphinx_theme
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/matplotlib/mpl-sphinx-theme
  summary: Matplotlib theme for Sphinx
  license: LicenseRef-PSF-based
  license_family: PSF
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tacaswell
    - awvwgk
